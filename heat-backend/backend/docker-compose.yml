version: "3.9"

services:
  api:
    build: .
    container_name: heat_api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://heat_user:heat_password@postgres:5432/heat_db?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "npx prisma migrate deploy && npm run seed && node src/server.js"

  postgres:
    image: postgres:16-alpine
    container_name: heat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: heat_user
      POSTGRES_PASSWORD: heat_password
      POSTGRES_DB: heat_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heat_user -d heat_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: heat_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
